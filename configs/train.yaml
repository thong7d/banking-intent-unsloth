# configs/train.yaml

model:
  base_model: "unsloth/Llama-3.1-8B-Instruct-bnb-4bit"
  max_seq_length: 512
  load_in_4bit: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  use_gradient_checkpointing: "unsloth"

training:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  logging_steps: 10
  save_strategy: "epoch"
  eval_strategy: "epoch"
  save_total_limit: 2
  fp16: true
  bf16: false
  optim: "adamw_8bit"
  seed: 42

data:
  train_path: "sample_data/train.csv"
  val_path: "sample_data/val.csv"